# XcodeGen project for the Listed app target.
#
# Build with:
#   brew install xcodegen
#   xcodegen generate
#   open Listed.xcodeproj
#
# The Swift package at the repo root provides ListedCore + ListedUI; this project
# pulls them in as a local package dependency.

name: Listed
options:
  bundleIdPrefix: app.listed
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: "complete"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

packages:
  Listed:
    path: .

targets:
  Listed (macOS):
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App/ListedApp
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: App/ListedApp/Info.plist
    settings:
      base:
        PRODUCT_NAME: Listed
        PRODUCT_BUNDLE_IDENTIFIER: app.listed.Listed
        CODE_SIGN_ENTITLEMENTS: App/ListedApp/Listed.macOS.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: Listed
        product: ListedCore
      - package: Listed
        product: ListedUI

  Listed (iOS):
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/ListedApp
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: App/ListedApp/Info.plist
    settings:
      base:
        PRODUCT_NAME: Listed
        PRODUCT_BUNDLE_IDENTIFIER: app.listed.Listed
        CODE_SIGN_ENTITLEMENTS: App/ListedApp/Listed.iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - package: Listed
        product: ListedCore
      - package: Listed
        product: ListedUI

  ListedCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/ListedCoreTests
    dependencies:
      - package: Listed
        product: ListedCore

schemes:
  Listed (macOS):
    build:
      targets:
        Listed (macOS): all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ListedCoreTests
  Listed (iOS):
    build:
      targets:
        Listed (iOS): all
    run:
      config: Debug
